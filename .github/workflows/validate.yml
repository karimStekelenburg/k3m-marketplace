name: Validate Agent Configs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate agent configs
        uses: agent-sh/agnix@v0.17.0
        with:
          target: 'claude-code'
          strict: 'true'
          config: '.agnix.toml'
          format: 'text'
